
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.search-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.search-row input{flex:1;height:36px;padding:0 12px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.fbtn{font-size:11px;padding:4px 10px;border:0.5px solid var(--color-border-secondary);border-radius:20px;background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;white-space:nowrap}
.fbtn.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tbl th{text-align:left;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-text-secondary);padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.tbl th:nth-child(1){width:32px}
.tbl th:nth-child(2){width:170px}
.tbl th:nth-child(3){width:170px}
.tbl th:nth-child(4){width:160px}
.tbl td{padding:9px 10px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:top;color:var(--color-text-primary)}
.tbl tr:hover td{background:var(--color-background-secondary)}
.name{font-weight:500;font-size:12px;color:var(--color-text-primary)}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-top:3px;font-weight:400}
.tag-product{background:#E6F1FB;color:#185FA5}
.tag-human{background:#E1F5EE;color:#0F6E56}
.tag-mixed{background:#EEEDFE;color:#534AB7}
.angle-primary{font-size:12px;color:var(--color-text-primary);font-weight:500;display:flex;align-items:center;gap:4px}
.angle-alt{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.cam-primary{font-size:12px;color:var(--color-text-primary);font-weight:500}
.cam-alt{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.star{color:#BA7517;font-size:10px}
.count{font-size:11px;color:var(--color-text-secondary);margin-bottom:6px}
.hidden{display:none}
</style>
<div class="wrap">
<h2 class="sr-only">Elaris Content Engine — archetype camera angle and lens preset reference guide</h2>
<div class="search-row">
  <input type="text" id="srch" placeholder="Search archetype..." oninput="filter()">
</div>
<div class="filter-btns">
  <button class="fbtn active" data-type="all" onclick="setType(this,'all')">All archetypes</button>
  <button class="fbtn" data-type="product" onclick="setType(this,'product')">Product only</button>
  <button class="fbtn" data-type="human" onclick="setType(this,'human')">Human / model</button>
  <button class="fbtn" data-type="mixed" onclick="setType(this,'mixed')">Mixed</button>
</div>
<div class="count" id="cnt"></div>
<table class="tbl" id="tbl">
<thead><tr>
  <th></th>
  <th>Archetype</th>
  <th>Best camera angle</th>
  <th>Lens / camera preset</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

let activeType='all';
function tagClass(t){return t==='product'?'tag-product':t==='human'?'tag-human':'tag-mixed'}
function tagLabel(t){return t==='product'?'Product':t==='human'?'Model':'Mixed'}

function render(data){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=data.map((a,i)=>`
<tr class="row" data-type="${a.type}">
  <td style="text-align:center;font-size:18px;line-height:1">${a.icon}</td>
  <td>
    <div class="name">${a.name}</div>
    <span class="tag ${tagClass(a.type)}">${tagLabel(a.type)}</span>
  </td>
  <td>
    <div class="angle-primary"><span class="star">★</span>${a.angle}</div>
    <div class="angle-alt">${a.angleAlt}</div>
  </td>
  <td>
    <div class="cam-primary"><span class="star">★</span>${a.cam}</div>
    <div class="cam-alt">${a.camAlt}</div>
  </td>
</tr>`).join('');
  document.getElementById('cnt').textContent=data.length+' archetype'+(data.length===1?'':'s');
}

function filter(){
  const q=document.getElementById('srch').value.toLowerCase();
  const filtered=archetypes.filter(a=>{
    const matchQ=!q||a.name.toLowerCase().includes(q)||a.angle.toLowerCase().includes(q)||a.cam.toLowerCase().includes(q);
    const matchT=activeType==='all'||a.type===activeType;
    return matchQ&&matchT;
  });
  render(filtered);
}

function setType(btn,type){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeType=type;
  filter();
}

render(archetypes);
</script>
