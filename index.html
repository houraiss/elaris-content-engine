        <div class="nav-bottom">
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLang('en', this)">EN</button>
                <button class="lang-btn" onclick="setLang('fr', this)">FR</button>
                <button class="lang-btn" onclick="setLang('ar', this)">AR</button>
            </div>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
                <span id="theme-icon">🌙</span>
                <div class="theme-toggle-track"></div>
                <span id="theme-label" data-i18n="theme_dark">Dark</span>
            </button>
            <div style="text-align:center;opacity:0.25;font-size:10px;letter-spacing:1px;font-family:var(--font-label);margin-top:8px">

            <div class="page-loading">
                <div class="spinner"></div>
                <p>Loading...</p>
            </div>
        </div>
        <div id="generate" class="page" style="display:none;"></div>
    </main>

    <!-- ═══ Toast Container ═══ -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ═══ Hidden file input ═══ -->
    <input type="file" id="file-input" accept="image/*" multiple style="display:none">

    <!-- ═══ Scripts ═══ -->

    <script src="js/canvas-engine.js?v=3"></script>
    <script src="js/templates.js?v=3"></script>
    <script src="js/captions.js?v=3"></script>
    <script src="js/export.js?v=3"></script>
    <script src="js/enhance.js?v=3"></script>
    <script src="js/enhance-prompt.js?v=1"></script>
    <script src="js/prompt-studio.js?v=39"></script>
    <script src="js/generate.js?v=4"></script>
    <script src="js/composer.js?v=3"></script>
    <script src="js/gallery.js?v=3"></script>
    <script src="js/watermark.js?v=3"></script>
    <script src="js/batch.js?v=1"></script>
    <script src="js/app.js?v=3"></script>

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(30px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
