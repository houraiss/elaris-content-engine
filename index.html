    <!-- ═══ Main Content ═══ -->
    <main id="main-content" class="main-content">

            <div class="page-loading">
                <div class="spinner"></div>
                <p>Loading...</p>
            </div>
        </div>

    <!-- ═══ Toast Container ═══ -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ═══ Hidden file input ═══ -->
    <input type="file" id="file-input" accept="image/*" multiple style="display:none">

    <!-- ═══ Scripts ═══ -->
    <script src="js/canvas-engine.js?v=3"></script>
    <script src="js/templates.js?v=3"></script>
    <script src="js/captions.js?v=3"></script>
    <script src="js/export.js?v=3"></script>
    <script src="js/enhance.js?v=3"></script>
    <script src="js/prompt-studio.js?v=3"></script>
    <script src="js/composer.js?v=3"></script>
    <script src="js/gallery.js?v=3"></script>
    <script src="js/watermark.js?v=3"></script>
    <script src="js/app.js?v=3"></script>

    <!-- PWA: Service Worker Registration + Install Prompt -->
    <script>
        // Register service worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[PWA] Service worker registered:', reg.scope))
                    .catch(err => console.warn('[PWA] SW registration failed:', err));
            });
        }

        // Capture the install prompt for a custom "Add to Home Screen" button
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;

            // Show install banner
            const banner = document.createElement('div');
            banner.id = 'pwa-install-banner';
            banner.innerHTML = `
                <div style="
                    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
                    background:linear-gradient(135deg, #1a1510 0%, #2a2015 100%);
                    border:1px solid rgba(166,124,82,0.4); border-radius:16px;
                    padding:14px 20px; display:flex; align-items:center; gap:14px;
                    box-shadow:0 8px 32px rgba(0,0,0,0.6); z-index:99999;
                    max-width:420px; width:calc(100% - 40px);
                    animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
                ">
                    <img src="icons/icon-192.png" alt="Elaris" style="width:44px;height:44px;border-radius:10px">
                    <div style="flex:1;min-width:0">
                        <div style="font-weight:700;font-size:14px;color:#f5f0eb">Install Elaris</div>
                        <div style="font-size:11px;color:#a67c52;margin-top:2px">Use offline on your phone</div>
                    </div>
                    <button id="pwa-install-btn" style="
                        background:linear-gradient(135deg,#a67c52,#c9a87c);
                        color:#0a0a0a;font-weight:700;font-size:12px;
                        border:none;padding:8px 18px;border-radius:8px;cursor:pointer;
                        white-space:nowrap;
                    ">Install</button>
                    <button id="pwa-dismiss-btn" style="
                        background:none;border:none;color:#666;font-size:18px;
                        cursor:pointer;padding:4px;line-height:1;
                    ">&times;</button>
                </div>
            `;
            document.body.appendChild(banner);

            document.getElementById('pwa-install-btn').addEventListener('click', async () => {
                banner.remove();
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                console.log('[PWA] Install result:', result.outcome);
                deferredPrompt = null;
            });

            document.getElementById('pwa-dismiss-btn').addEventListener('click', () => {
                banner.remove();
            });
        });

        window.addEventListener('appinstalled', () => {
            console.log('[PWA] App installed successfully');
            const banner = document.getElementById('pwa-install-banner');
            if (banner) banner.remove();
        });
    </script>

    <style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(30px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</body>
</html>
